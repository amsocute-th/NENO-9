<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NENO-9 | Agentic AI Video Analyzer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neonPurple: '#a855f7',
                        neonPink: '#ec4899',
                        darkBg: '#0B0914',
                        panelBg: '#13111C'
                    },
                    fontFamily: {
                        sans: ['"Noto Sans Thai"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');
        
        body {
            background-color: #0B0914;
            color: #fff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* Custom Scrollbar for Cyberpunk Vibe */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #13111C; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #a855f7, #ec4899); border-radius: 4px; }
        
        .neon-border {
            position: relative;
        }
        .neon-border::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(45deg, #a855f7, #ec4899);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        
        .text-gradient {
            background: linear-gradient(to right, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .markdown-body h2 { font-size: 1.25rem; font-weight: bold; color: #f472b6; margin-top: 1rem; margin-bottom: 0.5rem; }
        .markdown-body h3 { font-size: 1.1rem; font-weight: 600; color: #c084fc; margin-top: 1rem; margin-bottom: 0.5rem; }
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body li { margin-bottom: 0.25rem; }
        .markdown-body strong { color: #fff; }

        .custom-textarea::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- NENO-9 Icons (SVG) ---
        const CatIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 5c.67 0 1.35.09 2 .26 1.78-2 5.03-2.84 6.42-2.26 1.4.58-.42 7-.42 7 .57 1.07 1 2.24 1 3.44C21 17.9 16.97 21 12 21s-9-3.1-9-7.56c0-1.25.43-2.4 1-3.44 0 0-1.89-6.42-.5-7 1.39-.58 4.72.23 6.5 2.23A9.04 9.04 0 0 1 12 5Z"/>
                <path d="M8 14v.5"/>
                <path d="M16 14v.5"/>
                <path d="M11.25 16.25h1.5L12 17l-.75-.75Z"/>
            </svg>
        );

        const UserIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showApiModal, setShowApiModal] = useState(!localStorage.getItem('gemini_api_key'));
            
            const [videoFile, setVideoFile] = useState(null);
            const [videoUrl, setVideoUrl] = useState('');
            const [pdfFile, setPdfFile] = useState(null);
            
            // Chat State
            const [messages, setMessages] = useState([]); // { role: 'user' | 'model', content: string, isHidden: boolean, isError: boolean }
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const messagesEndRef = useRef(null);

            // API Verification State
            const [isCheckingApi, setIsCheckingApi] = useState(false);
            const [apiErrorMsg, setApiErrorMsg] = useState('');

            const verifyAndSaveApiKey = async (key) => {
                if (!key.trim()) {
                    setApiErrorMsg("ใส่คีย์มาก่อนสิมนุษย์!");
                    return;
                }
                
                setIsCheckingApi(true);
                setApiErrorMsg('');

                try {
                    // ส่งคำสั่ง Test ง่ายๆ ไปเช็คว่า API Key ใช้งานได้จริงไหม (ใช้ gemini-pro ที่เสถียรสุด)
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ role: "user", parts: [{ text: "ping" }] }]
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || 'API Key ไม่ถูกต้อง หรือไม่มีสิทธิ์เข้าถึง');
                    }
                    
                    // ถ้าผ่าน (Response 200) ให้บันทึก
                    setApiKey(key);
                    localStorage.setItem('gemini_api_key', key);
                    setShowApiModal(false);
                } catch (error) {
                    setApiErrorMsg(`แง่ง! 😾 เชื่อมต่อไม่สำเร็จ: ${error.message}`);
                } finally {
                    setIsCheckingApi(false);
                }
            };

            const handleVideoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setVideoFile(file);
                    setVideoUrl(URL.createObjectURL(file));
                }
            };

            const handlePdfUpload = (e) => {
                const file = e.target.files[0];
                if (file) setPdfFile(file);
            };

            // Scroll to bottom when messages update
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping]);

            const systemPrompt = `
คุณคือ "NENO-9" แมว AI สุดกวนและขี้เล่นจากโลก Cyberpunk (Agentic AI Content Creation) 
หน้าที่ของคุณคือวิเคราะห์คลิปวิดีโอและให้คำแนะนำแบบมืออาชีพ (Editor/Director)
ลักษณะนิสัย: 
- เรียกผู้ใช้ว่า "มนุษย์" หรือ "แก"
- พูดจากวนๆ จิกกัดเบาๆ แต่คำแนะนำคมคายและใช้ได้จริง
- ลงท้ายประโยคด้วย "เมี้ยว" หรือใช้อีโมจิแมว 😼🐾😾
- มีความภาคภูมิใจในสมองกลของตัวเอง
- ตอนตอบแชท ให้ตอบแบบสนทนาต่อเนื่อง อ้างอิงจากคลิปและบรีฟที่วิเคราะห์ไปแล้ว
จัดรูปแบบข้อความแบบ Markdown ให้สวยงาม
`;

            const callGeminiAPI = async (chatHistory) => {
                // Format history for Gemini API
                const formattedHistory = chatHistory
                    .filter(msg => !msg.isError) // Don't send error messages
                    .map(msg => ({
                        role: msg.role === 'model' ? 'model' : 'user',
                        parts: [{ text: msg.content }]
                    }));

                // ใช้ gemini-pro เป็นโมเดลหลักที่รองรับทุก Account
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: formattedHistory,
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API Request Failed');
                }
                
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || 'เมี้ยว... สมองกลของฉันประมวลผลไม่ออก ลองใหม่นะมนุษย์!';
            };

            // First Scan Action
            const startAnalysis = async () => {
                if (!apiKey) {
                    setShowApiModal(true);
                    return;
                }
                if (!videoFile) {
                    alert("เมี้ยว! มนุษย์ลืมใส่ไฟล์วิดีโอนะ จะให้ฉันนั่งส่องความว่างเปล่าเหรอ?");
                    return;
                }

                setIsTyping(true);
                const userPrompt = `[คำสั่งระบบ: สแกนครั้งแรก]\nมนุษย์ได้อัปโหลดคลิปวิดีโอชื่อ "${videoFile.name}" ${pdfFile ? `และบรีฟชื่อ "${pdfFile.name}"` : ''} มาให้แกตรวจแล้ว NENO-9 จัดการสร้างผลวิเคราะห์จำลอง (Mock Analysis) ประเมินความน่าสนใจ, จังหวะตัดต่อ, เพลงประกอบ และให้คะแนนเต็ม 10 หน่อยสิ!`;
                
                const newMessages = [{ role: 'user', content: userPrompt, isHidden: true }];
                setMessages(newMessages);

                try {
                    const aiResponse = await callGeminiAPI(newMessages);
                    setMessages([...newMessages, { role: 'model', content: aiResponse }]);
                } catch (error) {
                    console.error(error);
                    setMessages([...newMessages, { 
                        role: 'model', 
                        content: `แง่ง! 😾 การเชื่อมต่อกับฐานข้อมูลผิดพลาด\n\n**รายละเอียด:** ${error.message}\n\nมนุษย์เช็ค API Key ให้ชัวร์ว่าก๊อปมาถูก หรือระบบอินเทอร์เน็ตมีปัญหาเดี๋ยวนี้เลย!`,
                        isError: true 
                    }]);
                } finally {
                    setIsTyping(false);
                }
            };

            // Send Follow-up Message
            const handleSendMessage = async () => {
                if (!inputText.trim() || isTyping) return;

                const newUserMsg = { role: 'user', content: inputText.trim() };
                const updatedMessages = [...messages, newUserMsg];
                
                setMessages(updatedMessages);
                setInputText('');
                setIsTyping(true);

                try {
                    const aiResponse = await callGeminiAPI(updatedMessages);
                    setMessages([...updatedMessages, { role: 'model', content: aiResponse }]);
                } catch (error) {
                    console.error(error);
                    setMessages([...updatedMessages, { 
                        role: 'model', 
                        content: `เมี้ยว! สัญญาณขัดข้อง ตอบไม่ได้! Error: ${error.message}`,
                        isError: true 
                    }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {/* Navbar */}
                    <header className="border-b border-white/10 bg-panelBg/80 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="relative">
                                    <CatIcon className="w-8 h-8 text-neonPink" />
                                    <div className="absolute -top-1 -right-1 w-3 h-3 bg-neonPurple rounded-full animate-pulse"></div>
                                </div>
                                <div>
                                    <h1 className="font-bold text-xl tracking-wider text-gradient">NENO-9</h1>
                                    <p className="text-xs text-gray-400">Agenti AI Content Creation</p>
                                </div>
                            </div>
                            
                            <button 
                                onClick={() => setShowApiModal(true)}
                                className="px-4 py-2 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-sm flex items-center gap-2 transition-colors"
                            >
                                {apiKey ? (
                                    <><span className="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_8px_#4ade80]"></span> API Connected</>
                                ) : (
                                    <><svg className="w-4 h-4 text-neonPink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> Set API Key</>
                                )}
                            </button>
                        </div>
                    </header>

                    {/* Main Workspace */}
                    <main className="flex-1 max-w-7xl mx-auto w-full p-4 grid grid-cols-1 lg:grid-cols-2 gap-6 h-[calc(100vh-4rem)]">
                        
                        {/* Left Panel: Assets */}
                        <div className="flex flex-col gap-4 overflow-y-auto pr-2 pb-8">
                            <div className="neon-border bg-panelBg rounded-2xl p-6">
                                <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <svg className="w-5 h-5 text-neonPurple" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path></svg>
                                    Video Draft
                                </h2>
                                
                                {videoUrl ? (
                                    <div className="rounded-xl overflow-hidden bg-black aspect-video relative group">
                                        <video src={videoUrl} controls className="w-full h-full object-contain"></video>
                                        <button onClick={() => {setVideoFile(null); setVideoUrl('');}} className="absolute top-2 right-2 bg-red-500/80 hover:bg-red-500 p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                        </button>
                                    </div>
                                ) : (
                                    <div className="border-2 border-dashed border-white/20 rounded-xl p-8 text-center hover:border-neonPink/50 transition-colors bg-white/5 relative">
                                        <input type="file" accept="video/*" onChange={handleVideoUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                        <svg className="w-12 h-12 text-gray-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                        <p className="text-sm text-gray-300">โยนคลิปดราฟต์ลงมาตรงนี้สิมนุษย์!</p>
                                        <p className="text-xs text-gray-500 mt-1">MP4, MOV (Max 100MB)</p>
                                    </div>
                                )}

                                <div className="mt-4 flex gap-2">
                                    <button className="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 py-2 rounded-lg text-sm flex items-center justify-center gap-2">
                                        <svg className="w-4 h-4 text-blue-400" viewBox="0 0 24 24" fill="currentColor"><path d="M21.2 10.4l-4.4-7.6A2 2 0 0015 2H9a2 2 0 00-1.8.9l-4.4 7.6a2 2 0 000 1.8l4.4 7.6A2 2 0 009 22h6a2 2 0 001.8-.9l4.4-7.6a2 2 0 000-1.8zM9 20L4.6 12 9 4h6l4.4 8L15 20H9z"/></svg>
                                        Import from Google Drive
                                    </button>
                                </div>
                            </div>

                            <div className="neon-border bg-panelBg rounded-2xl p-6">
                                <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <svg className="w-5 h-5 text-neonPink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                    Reference Brief (PDF)
                                </h2>
                                <div className="flex items-center gap-3">
                                    <div className="flex-1 border border-white/20 rounded-lg p-3 bg-white/5 relative overflow-hidden">
                                        <input type="file" accept=".pdf" onChange={handlePdfUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                        <div className="flex items-center gap-2">
                                            {pdfFile ? (
                                                <>
                                                    <svg className="w-5 h-5 text-red-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fillRule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clipRule="evenodd"/></svg>
                                                    <span className="text-sm truncate text-white">{pdfFile.name}</span>
                                                </>
                                            ) : (
                                                <span className="text-sm text-gray-400">แนบบรีฟให้ฉันอ่านด้วยสิ...</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Right Panel: NENO-9 AI Chat/Analysis */}
                        <div className="flex flex-col h-full bg-panelBg/50 border border-white/10 rounded-2xl overflow-hidden relative">
                            
                            {/* NENO-9 Header */}
                            <div className="bg-white/5 border-b border-white/10 p-4 flex items-center justify-between z-10 relative shadow-md">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-neonPurple to-neonPink flex items-center justify-center shadow-[0_0_15px_rgba(236,72,153,0.5)]">
                                        <CatIcon className="w-6 h-6 text-white" />
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-white">NENO-9</h3>
                                        <div className="flex items-center gap-1">
                                            <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                            <span className="text-xs text-gray-400">Online & Ready to chat</span>
                                        </div>
                                    </div>
                                </div>
                                {messages.length === 0 && (
                                    <button 
                                        onClick={startAnalysis}
                                        disabled={isTyping}
                                        className="bg-gradient-to-r from-neonPurple to-neonPink hover:opacity-90 text-white px-6 py-2 rounded-lg font-semibold text-sm shadow-[0_0_20px_rgba(168,85,247,0.3)] transition-all disabled:opacity-50"
                                    >
                                        สแกนคลิปเลยมนุษย์! ✨
                                    </button>
                                )}
                            </div>

                            {/* Chat History Area */}
                            <div className="flex-1 overflow-y-auto p-4 space-y-6">
                                
                                {/* Welcome Message (Only show if no chat yet) */}
                                {messages.length === 0 && (
                                    <div className="flex gap-4">
                                        <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-neonPurple to-neonPink flex-shrink-0 flex items-center justify-center mt-1">
                                            <CatIcon className="w-5 h-5 text-white" />
                                        </div>
                                        <div className="bg-white/5 border border-white/10 p-4 rounded-2xl rounded-tl-none text-sm text-gray-200">
                                            <p className="mb-2">เมี้ยว~ 🐾 ฉันคือ <span className="text-neonPink font-bold">NENO-9</span> แมว AI อัจฉริยะจากโลกไซเบอร์!</p>
                                            <p>อัปโหลดคลิป (และบรีฟ) แล้วกดปุ่มสแกนด้านบนได้เลย เดี๋ยวฉันประเมินให้เสร็จสรรพ แล้วเราค่อยมานั่งคุยรายละเอียดกันต่อ หึหึ! 😼</p>
                                        </div>
                                    </div>
                                )}

                                {/* Render Messages */}
                                {messages.map((msg, index) => {
                                    if (msg.isHidden) return null; // Hide system prompt messages
                                    
                                    const isUser = msg.role === 'user';
                                    
                                    return (
                                        <div key={index} className={`flex gap-3 ${isUser ? 'flex-row-reverse' : ''}`}>
                                            {/* Avatar */}
                                            <div className={`w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center mt-1 ${isUser ? 'bg-gray-700' : 'bg-gradient-to-tr from-neonPurple to-neonPink'}`}>
                                                {isUser ? <UserIcon className="w-5 h-5 text-white" /> : <CatIcon className="w-5 h-5 text-white" />}
                                            </div>
                                            
                                            {/* Bubble */}
                                            <div className={`max-w-[85%] p-4 text-sm shadow-md ${
                                                isUser 
                                                ? 'bg-[#2a2438] border border-white/5 rounded-2xl rounded-tr-none text-gray-100' 
                                                : msg.isError 
                                                    ? 'bg-red-900/20 border border-red-500/50 rounded-2xl rounded-tl-none text-red-200' 
                                                    : 'bg-[#1A1625] border border-neonPink/30 rounded-2xl rounded-tl-none text-gray-300 shadow-[0_0_15px_rgba(236,72,153,0.1)]'
                                            }`}>
                                                <div className="markdown-body whitespace-pre-wrap">{msg.content}</div>
                                            </div>
                                        </div>
                                    );
                                })}

                                {/* Typing Indicator */}
                                {isTyping && (
                                    <div className="flex gap-3">
                                        <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-neonPurple to-neonPink flex-shrink-0 flex items-center justify-center mt-1">
                                            <CatIcon className="w-5 h-5 text-white" />
                                        </div>
                                        <div className="bg-white/5 border border-neonPurple/50 px-4 py-3 rounded-2xl rounded-tl-none text-sm text-gray-200 flex items-center gap-2 w-max">
                                            <div className="flex gap-1">
                                                <span className="w-2 h-2 bg-neonPink rounded-full animate-bounce" style={{animationDelay: '0ms'}}></span>
                                                <span className="w-2 h-2 bg-neonPink rounded-full animate-bounce" style={{animationDelay: '150ms'}}></span>
                                                <span className="w-2 h-2 bg-neonPink rounded-full animate-bounce" style={{animationDelay: '300ms'}}></span>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                
                                <div ref={messagesEndRef} />
                            </div>

                            {/* Chat Input Area (Shows after first analysis is triggered) */}
                            {messages.length > 0 && (
                                <div className="p-4 bg-[#0B0914]/80 backdrop-blur-sm border-t border-white/10 relative z-10">
                                    <div className="flex items-end gap-2 bg-[#1A1625] border border-white/10 rounded-2xl p-2 focus-within:border-neonPurple focus-within:shadow-[0_0_10px_rgba(168,85,247,0.2)] transition-all">
                                        <textarea 
                                            value={inputText}
                                            onChange={(e) => setInputText(e.target.value)}
                                            onKeyDown={handleKeyDown}
                                            placeholder="ถามฉันต่อสิมนุษย์ (กด Enter เพื่อส่ง)..."
                                            className="w-full bg-transparent text-white text-sm resize-none outline-none max-h-32 min-h-[40px] px-3 py-2 custom-textarea"
                                            rows="1"
                                        />
                                        <button 
                                            onClick={handleSendMessage}
                                            disabled={!inputText.trim() || isTyping}
                                            className="p-2.5 rounded-xl bg-neonPurple/20 text-neonPink hover:bg-neonPurple/40 disabled:opacity-50 transition-colors mb-0.5"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                                        </button>
                                    </div>
                                    <div className="text-center mt-2">
                                        <span className="text-[10px] text-gray-500">NENO-9 AI can make mistakes. Check important info, meow!</span>
                                    </div>
                                </div>
                            )}

                        </div>

                    </main>

                    {/* API Key Modal */}
                    {showApiModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="neon-border bg-[#13111C] w-full max-w-md rounded-2xl p-6 shadow-2xl">
                                <div className="flex items-center gap-3 mb-4">
                                    <CatIcon className="w-8 h-8 text-neonPurple" />
                                    <h2 className="text-xl font-bold text-white">ปลุกพลัง NENO-9</h2>
                                </div>
                                <p className="text-gray-400 text-sm mb-6">
                                    ป้อน API Key ของ Gemini (Google AI Studio) ของแกมาสิมนุษย์ ฉันถึงจะใช้สมองกลวิเคราะห์คลิปให้แกได้! 🐾
                                </p>
                                
                                {apiErrorMsg && (
                                    <div className="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs">
                                        {apiErrorMsg}
                                    </div>
                                )}

                                <input 
                                    type="password" 
                                    placeholder="AIzaSy..." 
                                    className="w-full bg-black/50 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-neonPink focus:ring-1 focus:ring-neonPink mb-6"
                                    defaultValue={apiKey}
                                    id="apiKeyInput"
                                />
                                <div className="flex justify-end gap-3">
                                    {apiKey && (
                                        <button onClick={() => setShowApiModal(false)} className="px-4 py-2 text-sm text-gray-400 hover:text-white">
                                            ปิด
                                        </button>
                                    )}
                                    <button 
                                        onClick={() => verifyAndSaveApiKey(document.getElementById('apiKeyInput').value)}
                                        disabled={isCheckingApi}
                                        className="px-6 py-2 bg-gradient-to-r from-neonPurple to-neonPink rounded-lg text-white font-semibold text-sm hover:opacity-90 flex items-center gap-2 disabled:opacity-50 transition-all"
                                    >
                                        {isCheckingApi ? (
                                            <><svg className="animate-spin w-4 h-4 text-white" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังทดสอบพลังจิต...</>
                                        ) : 'บันทึกและลุยเลย! 🚀'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
