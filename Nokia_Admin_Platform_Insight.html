    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 🚨 สลับใช้กุญแจจำลองเมื่ออยู่ใน Preview และใช้กุญแจจริงเมื่ออยู่บน GitHub 🚨
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB-agjCrPCmLQicu7KJ-Jl9Ca9OyFA8HDQ",
            authDomain: "nokia-fb-report.firebaseapp.com",
            projectId: "nokia-fb-report",
            storageBucket: "nokia-fb-report.firebasestorage.app",
            messagingSenderId: "58057573736",
            appId: "1:58057573736:web:c51e87cb332075a05182dd"
        };
        
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'nokia-insight-v1';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.nokiaDB = { db, auth, appId: currentAppId, setDoc, doc };

        // ระบบยืนยันตัวตนที่รองรับทั้ง Canvas Preview และ GitHub Pages
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Firebase Auth Error:", error);
                const statusText = document.getElementById('ai-status');
                if (statusText) statusText.innerText = "⚠️ ระบบ Preview อาจมีปัญหาการเชื่อมต่อ แต่โค้ดพร้อมใช้บน Github แล้วครับ";
            }
        };
        initAuth();
    </script>

    <script>
        const apiKey = ""; // Mandatory declaration
        const nokiaApiKey = "AIzaSyAkm0b87IDrZBB9SEjza2X4gNYJDeU_it4"; // กุญแจของคุณ

        window.addEventListener('DOMContentLoaded', () => { 
            document.getElementById('report-date').value = new Date().toISOString().split('T')[0]; 
        });

        function calculateDaysOnline() {
            const pub = document.getElementById('inp-pub-date').value;
            const rep = document.getElementById('report-date').value;
            if(pub && rep) { 
                const diff = Math.max(0, Math.ceil((new Date(rep) - new Date(pub)) / 86400000)); 
                document.getElementById('display-days').innerText = diff; 
            }
        }

        function cleanNum(val) {
            if(!val) return 0;
            return parseFloat(val.toString().replace(/%/g, '').trim()) || 0;
        }

        function cleanFBVideoURL(url) {
            if (!url) return "";
            try {
                let clean = url.trim();
                if (clean.includes("?")) clean = clean.split("?")[0];
                clean = clean.replace("m.facebook.com", "www.facebook.com").replace("fb.watch", "www.facebook.com/watch");
                const patterns = [/\/videos\/([\w-]+)/, /\/reels\/([\w-]+)/, /\/reel\/([\w-]+)/, /\/share\/r\/([\w-]+)/];
                let videoId = "";
                for (let p of patterns) {
                    const match = clean.match(p);
                    if (match && match[1]) { videoId = match[1]; break; }
                }
                return videoId ? "https://www.facebook.com/watch/?v=" + videoId : clean;
            } catch (e) { return url; }
        }

        // --- 🤖 AI SCAN HANDLER ---
        document.getElementById('image-upload').addEventListener('change', async (e) => {
            const files = e.target.files; if(!files.length) return;
            const statusText = document.getElementById('ai-status');
            const formSection = document.getElementById('form-section');
            
            statusText.innerText = "⏳ AI กำลังเจาะลึกข้อมูลเพื่อเอเจนซี่ (โปรดรอสักครู่)...";
            statusText.style.color = "#FF1493";
            formSection.style.opacity = "0.4";
            
            try {
                const prompt = `Analyze Facebook Insight images. 
                1. Extract basic metrics. Identify publishDate (YYYY-MM-DD).
                2. Generate 'titleTH' and 'descTH' in Thai (Professional & ROI-focused).
                3. Generate 'audienceInsight' in THAI.
                CRITICAL REQUIREMENT:
                - For 'audienceInsight', analyze for Marketing Agency use. Include 3 dimensions: 1) กำลังซื้อ 2) ความสนใจหลัก 3) พฤติกรรมการเสพสื่อ. Use newlines (\\n) for readability.
                - For Age Distribution (a13, a18, a25, a35, a45), return ONLY raw numbers (e.g., 35.5).
                Return JSON only.`;

                const parts = [{ text: prompt }];
                for(let f of files) { 
                    const b64 = await new Promise(r => { const reader = new FileReader(); reader.onload = () => r(reader.result.split(',')[1]); reader.readAsDataURL(f); }); 
                    parts.push({ inlineData: { mimeType: f.type, data: b64 } }); 
                }

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${nokiaApiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ role: "user", parts }], 
                        generationConfig: { 
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    reportedDate: {type:"STRING"}, publishDate: {type:"STRING"}, views: {type:"STRING"}, totalEngagement: {type:"STRING"}, likes: {type:"STRING"}, comments: {type:"STRING"}, shares: {type:"STRING"}, saves: {type:"STRING"},
                                    nonFollNum: {type:"STRING"}, nonFollPct: {type:"STRING"}, follNum: {type:"STRING"}, follPct: {type:"STRING"},
                                    titleTH: {type:"STRING"}, descTH: {type:"STRING"}, male: {type:"STRING"}, female: {type:"STRING"}, unknown: {type:"STRING"}, topAge: {type:"STRING"},
                                    a13: {type:"STRING"}, a18: {type:"STRING"}, a25: {type:"STRING"}, a35: {type:"STRING"}, a45: {type:"STRING"}, audienceInsight: {type:"STRING"}
                                }
                            }
                        } 
                    })
                });
                
                const result = await res.json();

                if (!res.ok) {
                    throw new Error(result.error?.message || "การเชื่อมต่อ AI ล้มเหลว");
                }

                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                
                if(data.reportedDate) document.getElementById('report-date').value = data.reportedDate;
                if(data.publishDate) document.getElementById('inp-pub-date').value = data.publishDate;
                
                document.getElementById('inp-views').value = data.views || ""; 
                document.getElementById('inp-eng').value = data.totalEngagement || ""; 
                document.getElementById('inp-likes').value = data.likes || ""; 
                document.getElementById('inp-comments').value = data.comments || ""; 
                document.getElementById('inp-shares').value = data.shares || ""; 
                document.getElementById('inp-saves').value = data.saves || "";
                document.getElementById('inp-non-num').value = data.nonFollNum || ""; 
                document.getElementById('inp-non-pct').value = data.nonFollPct || ""; 
                document.getElementById('inp-foll-num').value = data.follNum || ""; 
                document.getElementById('inp-foll-pct').value = data.follPct || "";
                document.getElementById('inp-rtitle-th').value = data.titleTH || ""; 
                document.getElementById('inp-rdesc-th').value = data.descTH || ""; 
                document.getElementById('inp-male').value = data.male || "0"; 
                document.getElementById('inp-female').value = data.female || "0"; 
                document.getElementById('inp-unknown').value = data.unknown || "0"; 
                document.getElementById('inp-age').value = data.topAge || "";
                document.getElementById('inp-age-1').value = data.a13 || "0"; 
                document.getElementById('inp-age-2').value = data.a18 || "0"; 
                document.getElementById('inp-age-3').value = data.a25 || "0"; 
                document.getElementById('inp-age-4').value = data.a35 || "0"; 
                document.getElementById('inp-age-5').value = data.a45 || "0";
                document.getElementById('inp-ainsight').value = data.audienceInsight || "";
                
                calculateDaysOnline(); 
                statusText.innerText = "✅ AGENCY INSIGHT SYNCED";
                statusText.style.color = "#10b981";
                formSection.style.opacity = "1";
            } catch (err) { 
                console.error(err); 
                statusText.innerText = "❌ SCAN FAILED: " + err.message; 
                statusText.style.color = "#ef4444";
                formSection.style.opacity = "1";
            }
        });

        // --- ☁️ CLOUD PUBLISHING ---
        async function publishToCloud() {
            const btn = document.getElementById('btn-publish');
            if (!window.nokiaDB) { alert("เชื่อมต่อคลาวด์ไม่ได้ กรุณารีเฟรช"); return; }
            if (!window.nokiaDB.auth.currentUser) { alert("รอเข้าระบบคลาวด์สักครู่..."); return; }
            
            btn.innerHTML = "⏳ PUBLISHING..."; btn.disabled = true;

            const dataToSave = {
                reportDate: document.getElementById('report-date').value,
                publishDate: document.getElementById('inp-pub-date').value,
                daysOnline: document.getElementById('display-days').innerText,
                link: document.getElementById('inp-link').value,
                videoUrl: cleanFBVideoURL(document.getElementById('inp-video-url').value),
                views: document.getElementById('inp-views').value, eng: document.getElementById('inp-eng').value, likes: document.getElementById('inp-likes').value, comments: document.getElementById('inp-comments').value, shares: document.getElementById('inp-shares').value, saves: document.getElementById('inp-saves').value,
                nonNum: document.getElementById('inp-non-num').value, nonPct: cleanNum(document.getElementById('inp-non-pct').value), follNum: document.getElementById('inp-foll-num').value, follPct: cleanNum(document.getElementById('inp-foll-pct').value),
                rTitleTH: document.getElementById('inp-rtitle-th').value, rDescTH: document.getElementById('inp-rdesc-th').value,
                male: cleanNum(document.getElementById('inp-male').value), female: cleanNum(document.getElementById('inp-female').value), unknownGender: cleanNum(document.getElementById('inp-unknown').value), age: document.getElementById('inp-age').value,
                chart: [cleanNum(document.getElementById('inp-age-1').value), cleanNum(document.getElementById('inp-age-2').value), cleanNum(document.getElementById('inp-age-3').value), cleanNum(document.getElementById('inp-age-4').value), cleanNum(document.getElementById('inp-age-5').value)],
                insight: document.getElementById('inp-ainsight').value,
                updatedAt: new Date().toISOString()
            };

            try {
                const { db, appId, setDoc, doc } = window.nokiaDB;
                const reportId = "report-" + Date.now();
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', reportId), dataToSave);

                // 🚨 ลิงก์ปลายทางสำหรับ amsocute-th 🚨
                const finalUrl = `https://amsocute-th.github.io/NENO-9/index.html?id=${reportId}`;
                
                document.getElementById('share-url').value = finalUrl;
                document.getElementById('share-link-box').classList.remove('hidden');
                btn.innerHTML = "✅ PUBLISHED!";
            } catch (err) {
                console.error(err); alert("บันทึกไม่สำเร็จ"); btn.innerHTML = "❌ FAILED";
            } finally { btn.disabled = false; }
        }

        function copyLink() {
            const copyText = document.getElementById("share-url");
            copyText.select(); document.execCommand("copy");
            alert("คัดลอกลิงก์สำเร็จ! ส่งต่อให้ลูกค้าได้เลยครับ");
        }
    </script>
